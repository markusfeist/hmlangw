services:
  hmlangw:
    build:
      context: .
      dockerfile: Dockerfile
    image: hmlangw:latest
    container_name: hmlangw
    restart: unless-stopped

    environment:
      # 10-stellige Seriennummer des HomeMatic Gateways
      HM_SERIAL: "OEQ0610638"

      # Adresse und Port des CoPro
      # Netzwerk-CoPro (z.B. CUNX / MappleCUN):
      HM_SERVER: "192.168.6.10:2324"

      # Zusätzliche Parameter:
      #   -t   Netzwerkzugriff auf CoPro aktivieren
      #   -D   Debug-Ausgaben
      #   -b   CoPro NICHT in Bootloader-Modus versetzen
      HM_PARAMS: "-t"

    # network_mode: host – Container nutzt direkt den Netzwerk-Stack des Hosts.
    # Vorteile: DNS, Routing und alle Adressen funktionieren wie außerhalb des Containers.
    # Hinweis: ports-Mapping ist bei host-Netzwerk nicht nötig (und wird ignoriert),
    #          der Gateway ist automatisch auf Port 2000 (BidCoS) und 2001 (Keepalive) des Hosts erreichbar.
    network_mode: host

    #Alternativ (Port müssen für eine CCU fest 2000 und 2001 sein:
    #ports:
    #  - "2000:2000"
    #  - "2001:2001"

    # Persistente Ablage der Seriennummer-Datei
    volumes:
      - hmlangw_data:/data

    # Für direkten Zugriff auf einen lokalen seriellen CoPro
    # (Kommentarblock entfernen und HM_PARAMS ohne -t setzen)
    # devices:
    #   - /dev/ttyAMA0:/dev/ttyAMA0

    # Healthcheck: prüft ob der Prozess läuft
    healthcheck:
      test: ["CMD-SHELL", "pgrep hmlangw || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  hmlangw_data:
