name: Docker Image bauen und veröffentlichen

on:
  push:
    tags: ["v*"]   # nur bei Versions-Tags, z.B. v1.2.0

jobs:
  build-and-push:
    if: github.event.base_ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Login zur GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image-Metadaten ermitteln (Tags und Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Versionstag z.B. v1.2.3 -> 1.2.3 und 1.2 und 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # latest immer auf den neuesten Release zeigen
            type=raw,value=latest

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-Cache für schnellere Folge-Builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
